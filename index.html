<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 愛麗絲麻將贏整年</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #fff0f6; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #f472b6; border-radius: 10px; }
        /* 避免 iOS 輸入框縮放 */
        input, select { font-size: 16px !important; }
    </style>
</head>
<body class="bg-[#fff0f6] text-slate-700 min-h-screen">
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import React, { useState, useEffect, useMemo } from "https://esm.sh/react@18.2.0";
        import ReactDOM from "https://esm.sh/react-dom@18.2.0/client";

        // --- 修正重點 1: Firebase 安全檢查 ---
        let firebaseConfig;
        try {
            // 如果是在支援的環境，會讀取注入的變數，否則請在下方 else 填入你的 config
            firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
                apiKey: "YOUR_API_KEY",
                authDomain: "YOUR_PROJECT.firebaseapp.com",
                projectId: "YOUR_PROJECT_ID",
                storageBucket: "YOUR_PROJECT.appspot.com",
                messagingSenderId: "YOUR_SENDER_ID",
                appId: "YOUR_APP_ID"
            };
        } catch (e) {
            console.error("Firebase config parse error", e);
        }

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'mahjong-2026-pro';

        const STAKES_OPTIONS = ['30/10', '50/10', '50/20', '100/20', '100/50', '自定義'];
        const TYPE_OPTIONS = ['台麻', '美麻'];

        function App() {
            const [user, setUser] = useState(null);
            const [currentDate, setCurrentDate] = useState(new Date(2026, 0, 1));
            const [records, setRecords] = useState({});
            const [friends, setFriends] = useState([]);
            const [modalOpen, setModalOpen] = useState(false);
            const [selectedDateKey, setSelectedDateKey] = useState("");
            const [editingSessionIdx, setEditingSessionIdx] = useState(null);
            const [newFriendName, setNewFriendName] = useState("");

            const [formData, setFormData] = useState({
                id: null, type: '台麻', stakes: '30/10', customStakes: '', location: '', rounds: '', 
                win: '0', loss: '0', bonus: '0', tableFee: '0', selectedFriends: [], friendStats: {}
            });

            // 認證
            useEffect(() => {
                const unsub = onAuthStateChanged(auth, (u) => {
                    if (u) setUser(u);
                    else signInAnonymously(auth);
                });
                return unsub;
            }, []);

            // 資料監聽 - 修正路徑與 null 檢查
            useEffect(() => {
                if (!user) return;
                const recordsRef = doc(db, 'artifacts', appId, 'users', user.uid, 'settings', 'mahjong_records_v9');
                const friendsRef = doc(db, 'artifacts', appId, 'users', user.uid, 'settings', 'mahjong_friends');

                const unsubR = onSnapshot(recordsRef, d => d.exists() ? setRecords(d.data()) : setRecords({}));
                const unsubF = onSnapshot(friendsRef, d => d.exists() ? setFriends(d.data().list || []) : setFriends([]));
                return () => { unsubR(); unsubF(); };
            }, [user]);

            const saveToCloud = async (path, data) => {
                if (!user) return;
                try {
                    await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'settings', path), data);
                } catch (e) { alert("儲存失敗: " + e.message); }
            };

            const handleAddFriend = async () => {
                const name = newFriendName.trim();
                if (!name || friends.includes(name)) return;
                const newList = [...friends, name];
                setFriends(newList);
                await saveToCloud('mahjong_friends', { list: newList });
                setNewFriendName("");
            };

            const openDateModal = (key) => { setSelectedDateKey(key); setEditingSessionIdx(null); setModalOpen(true); };
            
            const startNew = () => {
                setFormData({ id: Date.now(), type: '台麻', stakes: '30/10', customStakes: '', location: '', rounds: '', win: '0', loss: '0', bonus: '0', tableFee: '0', selectedFriends: [], friendStats: {} });
                setEditingSessionIdx('new');
            };

            const handleSave = async () => {
                const daySessions = [...(records[selectedDateKey] || [])];
                const session = {
                    ...formData,
                    win: Number(formData.win) || 0,
                    loss: Number(formData.loss) || 0,
                    bonus: Number(formData.bonus) || 0,
                    tableFee: Number(formData.tableFee) || 0,
                    friendStats: Object.fromEntries(Object.entries(formData.friendStats).map(([k,v]) => [k, Number(v)||0]))
                };

                if (editingSessionIdx === 'new') {
                    daySessions.push(session);
                } else {
                    daySessions[editingSessionIdx] = session;
                }

                const newRecs = { ...records, [selectedDateKey]: daySessions };
                setRecords(newRecs);
                await saveToCloud('mahjong_records_v9', newRecs);
                setEditingSessionIdx(null);
            };

            // 統計 logic
            const allSessions = useMemo(() => Object.values(records).flat(), [records]);
            const yearly = useMemo(() => allSessions.reduce((a, c) => ({
                win: a.win + (Number(c.win) || 0),
                loss: a.loss + (Number(c.loss) || 0),
                bonus: a.bonus + (Number(c.bonus) || 0),
                tableFee: a.tableFee + (Number(c.tableFee) || 0)
            }), { win: 0, loss: 0, bonus: 0, tableFee: 0 }), [allSessions]);

            const currentYear = currentDate.getFullYear();
            const currentMonth = currentDate.getMonth() + 1;
            const monthPrefix = `${currentYear}-${String(currentMonth).padStart(2,'0')}`;
            const monthly = useMemo(() => {
                const filtered = Object.keys(records).filter(k => k.startsWith(monthPrefix)).flatMap(k => records[k]);
                return filtered.reduce((a, c) => ({
                    win: a.win + (Number(c.win) || 0),
                    loss: a.loss + (Number(c.loss) || 0)
                }), { win: 0, loss: 0 });
            }, [records, monthPrefix]);

            const leaderboard = useMemo(() => {
                const list = [
                    { name: "本人", total: yearly.win - yearly.loss, isMe: true },
                    ...friends.map(f => ({ 
                        name: f, 
                        total: allSessions.reduce((s, sess) => s + (sess.friendStats?.[f] || 0), 0), 
                        isMe: false 
                    }))
                ];
                return list.sort((a, b) => b.total - a.total);
            }, [yearly, friends, allSessions]);

            return React.createElement('div', { className: 'max-w-7xl mx-auto p-4 md:p-8' },
                // Header
                React.createElement('div', { className: 'flex flex-col md:flex-row justify-between gap-4 mb-8' },
                    React.createElement('div', null,
                        React.createElement('h1', { className: 'text-3xl font-black text-slate-900 flex items-center gap-3' },
                            React.createElement('span', { className: 'bg-gradient-to-br from-purple-600 to-pink-500 text-white px-3 py-1 rounded-2xl' }, '2026'),
                            '愛麗絲麻將贏整年'
                        )
                    ),
                    React.createElement('div', { className: 'bg-white/80 p-4 rounded-2xl shadow-sm flex gap-6 text-center' },
                        React.createElement('div', null, React.createElement('p', { className: 'text-[10px] text-slate-400 font-bold' }, '年度損益'), React.createElement('p', { className: `text-lg font-black ${yearly.win - yearly.loss >= 0 ? 'text-red-500' : 'text-green-600'}` }, (yearly.win - yearly.loss).toLocaleString())),
                        React.createElement('div', { className: 'w-px h-8 bg-pink-100' }),
                        React.createElement('div', null, React.createElement('p', { className: 'text-[10px] text-slate-400 font-bold' }, '總場數'), React.createElement('p', { className: 'text-lg font-black text-purple-600' }, allSessions.length))
                    )
                ),

                // Stats Cards
                React.createElement('div', { className: 'grid grid-cols-2 md:grid-cols-4 gap-4 mb-8' },
                    React.createElement(StatCard, { title: '年度總贏', val: yearly.win, color: 'red' }),
                    React.createElement(StatCard, { title: '年度總輸', val: yearly.loss, color: 'green' }),
                    React.createElement(StatCard, { title: '年度分紅', val: yearly.bonus, color: 'red' }),
                    React.createElement(StatCard, { title: '年度台費', val: yearly.tableFee, color: 'green' })
                ),

                React.createElement('div', { className: 'grid grid-cols-1 lg:grid-cols-12 gap-8' },
                    React.createElement('div', { className: 'lg:col-span-8 space-y-6' },
                        React.createElement('div', { className: 'bg-gradient-to-r from-purple-700 to-pink-600 rounded-[2.5rem] p-8 text-white shadow-xl flex justify-between items-center' },
                            React.createElement('div', null, React.createElement('p', { className: 'text-[10px] opacity-80' }, `${currentMonth}月 戰報`), React.createElement('h2', { className: 'text-2xl font-black' }, 'Monthly Overview')),
                            React.createElement('div', { className: 'text-right' }, React.createElement('p', { className: 'text-2xl font-black' }, (monthly.win - monthly.loss >= 0 ? '+' : '') + (monthly.win - monthly.loss).toLocaleString()))
                        ),
                        // Calendar
                        React.createElement('div', { className: 'bg-white rounded-[2.5rem] p-8 shadow-sm' },
                            React.createElement('div', { className: 'flex justify-between mb-8 px-4' },
                                React.createElement('button', { className: 'p-2 hover:bg-pink-50 rounded-full', onClick: () => setCurrentDate(new Date(currentYear, currentDate.getMonth()-1, 1)) }, '◀'),
                                React.createElement('h3', { className: 'font-black text-lg' }, `${currentYear}年 ${currentMonth}月`),
                                React.createElement('button', { className: 'p-2 hover:bg-pink-50 rounded-full', onClick: () => setCurrentDate(new Date(currentYear, currentDate.getMonth()+1, 1)) }, '▶')
                            ),
                            React.createElement('div', { className: 'grid grid-cols-7 gap-2' },
                                ['日','一','二','三','四','五','六'].map(d => React.createElement('div', { key: d, className: 'text-center text-[10px] text-pink-300 font-bold pb-2' }, d)),
                                Array(new Date(currentYear, currentMonth-1, 1).getDay()).fill(0).map((_,i) => React.createElement('div', { key: `e-${i}` })),
                                Array.from({ length: new Date(currentYear, currentMonth, 0).getDate() }).map((_, i) => {
                                    const day = i + 1;
                                    const key = `${currentYear}-${String(currentMonth).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                                    const sess = records[key] || [];
                                    return React.createElement('button', { key, onClick: () => openDateModal(key), className: 'aspect-square rounded-xl hover:bg-pink-50 flex flex-col items-center justify-center transition-all' },
                                        React.createElement('span', { className: `text-sm font-bold ${sess.length > 0 ? 'text-purple-600' : 'text-slate-400'}` }, day),
                                        React.createElement('div', { className: 'flex gap-0.5 mt-1' }, sess.map((_,idx) => React.createElement('div', { key: idx, className: 'w-1 h-1 bg-pink-400 rounded-full' })))
                                    );
                                })
                            )
                        )
                    ),

                    React.createElement('div', { className: 'lg:col-span-4 space-y-6' },
                        React.createElement('div', { className: 'bg-white rounded-[2.5rem] p-8 shadow-sm' },
                            React.createElement('h3', { className: 'text-lg font-black mb-6' }, '年度損益排行'),
                            React.createElement('div', { className: 'space-y-3 max-h-80 overflow-y-auto custom-scrollbar pr-2' },
                                leaderboard.map((item, idx) => React.createElement('div', { key: item.name, className: `flex justify-between p-4 rounded-2xl border ${item.isMe ? 'bg-purple-600 text-white border-transparent' : 'bg-slate-50 border-slate-100'}` },
                                    React.createElement('span', { className: 'font-bold' }, `${idx+1}. ${item.name}`),
                                    React.createElement('span', { className: 'font-black' }, (item.total > 0 ? '+' : '') + item.total.toLocaleString())
                                ))
                            )
                        ),
                        React.createElement('div', { className: 'bg-white rounded-[2.5rem] p-8 shadow-sm' },
                            React.createElement('h3', { className: 'text-lg font-black mb-4' }, '新增麻友'),
                            React.createElement('div', { className: 'flex gap-2' },
                                React.createElement('input', { value: newFriendName, onChange: e => setNewFriendName(e.target.value), className: 'flex-1 bg-slate-50 rounded-xl p-3 text-sm outline-none focus:ring-2 ring-pink-200', placeholder: '麻友暱稱' }),
                                React.createElement('button', { onClick: handleAddFriend, className: 'bg-purple-600 text-white px-5 rounded-xl font-bold hover:bg-purple-700' }, '+')
                            )
                        )
                    )
                ),

                // Modal
                modalOpen && React.createElement('div', { className: 'fixed inset-0 bg-slate-900/50 backdrop-blur z-50 flex items-center justify-center p-4' },
                    React.createElement('div', { className: 'bg-white rounded-[2.5rem] w-full max-w-lg p-8 max-h-[90vh] overflow-y-auto custom-scrollbar' },
                        React.createElement('div', { className: 'flex justify-between items-center mb-6' },
                            React.createElement('h3', { className: 'text-xl font-black text-purple-600' }, selectedDateKey),
                            React.createElement('button', { className: 'p-2 text-slate-400 hover:text-slate-600', onClick: () => setModalOpen(false) }, '✕')
                        ),
                        editingSessionIdx === null ? React.createElement('div', { className: 'space-y-4' },
                            React.createElement('button', { onClick: startNew, className: 'w-full py-8 border-2 border-dashed border-pink-100 rounded-3xl text-pink-300 font-bold hover:bg-pink-50 transition-colors' }, '+ 新增場次'),
                            (records[selectedDateKey] || []).map((s, i) => React.createElement('div', { key: i, className: 'p-4 bg-slate-50 rounded-2xl flex justify-between items-center' },
                                React.createElement('div', null, React.createElement('p', { className: 'font-bold text-slate-700' }, s.location || '未知地點'), React.createElement('p', { className: 'text-[10px] text-slate-400' }, `${s.type} | ${s.stakes}`)),
                                React.createElement('div', { className: 'flex items-center gap-4' },
                                    React.createElement('span', { className: `font-black ${(Number(s.win)-Number(s.loss))>=0?'text-red-500':'text-green-600'}` }, (Number(s.win)-Number(s.loss) >= 0 ? '+' : '') + (Number(s.win)-Number(s.loss))),
                                    React.createElement('button', { onClick: () => { setFormData(s); setEditingSessionIdx(i); }, className: 'bg-white p-2 rounded-lg shadow-sm text-purple-600' }, '✎')
                                )
                            ))
                        ) : React.createElement('div', { className: 'space-y-6' },
                            // Form Inputs
                            React.createElement('div', { className: 'grid grid-cols-2 gap-4' },
                                React.createElement(Input, { label: '地點', value: formData.location, onChange: v => setFormData({...formData, location: v}) }),
                                React.createElement(Input, { label: '將數', value: formData.rounds, onChange: v => setFormData({...formData, rounds: v}) })
                            ),
                            React.createElement('div', { className: 'grid grid-cols-2 gap-4' },
                                React.createElement('div', null, React.createElement('p', { className: 'text-[10px] mb-1 font-bold' }, '類型'), React.createElement('select', { className: 'w-full p-2 bg-slate-50 rounded-lg outline-none', value: formData.type, onChange: e => setFormData({...formData, type: e.target.value}) }, TYPE_OPTIONS.map(o => React.createElement('option', { key: o }, o)))),
                                React.createElement('div', null, React.createElement('p', { className: 'text-[10px] mb-1 font-bold' }, '底台'), React.createElement('select', { className: 'w-full p-2 bg-slate-50 rounded-lg outline-none', value: formData.stakes, onChange: e => setFormData({...formData, stakes: e.target.value}) }, STAKES_OPTIONS.map(o => React.createElement('option', { key: o }, o))))
                            ),
                            React.createElement('div', { className: 'bg-purple-600 rounded-3xl p-6 grid grid-cols-2 gap-4' },
                                React.createElement(DarkInput, { label: '贏錢', value: formData.win, onChange: v => setFormData({...formData, win: v}) }),
                                React.createElement(DarkInput, { label: '分紅', value: formData.bonus, onChange: v => setFormData({...formData, bonus: v}) }),
                                React.createElement(DarkInput, { label: '輸錢', value: formData.loss, onChange: v => setFormData({...formData, loss: v}) }),
                                React.createElement(DarkInput, { label: '台費', value: formData.tableFee, onChange: v => setFormData({...formData, tableFee: v}) })
                            ),
                            React.createElement('div', { className: 'space-y-2' },
                                React.createElement('p', { className: 'text-[10px] font-bold' }, '麻友損益 (點擊頭像開啟)'),
                                React.createElement('div', { className: 'flex flex-wrap gap-2' }, friends.map(f => React.createElement('button', { key: f, onClick: () => {
                                    const isSel = formData.selectedFriends.includes(f);
                                    const next = isSel ? formData.selectedFriends.filter(x => x !== f) : [...formData.selectedFriends, f];
                                    const stats = { ...formData.friendStats }; 
                                    if(!isSel) stats[f] = '0'; else delete stats[f];
                                    setFormData({ ...formData, selectedFriends: next, friendStats: stats });
                                }, className: `px-3 py-1 rounded-full text-xs font-bold border transition-all ${formData.selectedFriends.includes(f) ? 'bg-pink-500 text-white border-transparent' : 'bg-white text-slate-400 border-slate-100'}` }, f))),
                                React.createElement('div', { className: 'grid grid-cols-2 gap-2 mt-3' }, formData.selectedFriends.map(f => React.createElement('div', { key: f, className: 'flex justify-between items-center bg-slate-50 p-2 px-4 rounded-xl' },
                                    React.createElement('span', { className: 'text-xs font-bold text-slate-500 truncate mr-2' }, f),
                                    React.createElement('input', { type: 'number', className: 'w-16 text-right bg-transparent outline-none font-black text-purple-600', value: formData.friendStats[f] ?? '', onChange: e => setFormData({...formData, friendStats: {...formData.friendStats, [f]: e.target.value}}) })
                                )))
                            ),
                            React.createElement('div', { className: 'flex gap-4 pt-4' },
                                React.createElement('button', { onClick: () => setEditingSessionIdx(null), className: 'flex-1 font-bold text-slate-400 hover:text-slate-600' }, '取消'),
                                React.createElement('button', { onClick: handleSave, className: 'flex-1 bg-gradient-to-r from-purple-600 to-pink-500 text-white py-4 rounded-2xl font-black shadow-lg shadow-purple-100' }, '儲存場次')
                            )
                        )
                    )
                )
            );
        }

        // --- Helper Components ---
        function StatCard({ title, val, color }) {
            return React.createElement('div', { className: 'bg-white p-5 rounded-3xl shadow-sm border border-pink-50/50' },
                React.createElement('p', { className: 'text-[10px] text-slate-400 font-bold uppercase tracking-wider' }, title),
                React.createElement('p', { className: `text-xl font-black mt-1 ${color==='red'?'text-red-500':'text-green-600'}` }, (val || 0).toLocaleString())
            );
        }
        function Input({ label, value, onChange }) {
            return React.createElement('div', null, React.createElement('p', { className: 'text-[10px] mb-1 font-bold' }, label), React.createElement('input', { className: 'w-full p-2 bg-slate-50 rounded-lg outline-none focus:ring-2 ring-pink-100', value: value || '', onChange: e => onChange(e.target.value) }));
        }
        function DarkInput({ label, value, onChange }) {
            return React.createElement('div', { className: 'text-center' }, React.createElement('p', { className: 'text-[10px] text-purple-100 mb-1 font-bold' }, label), React.createElement('input', { type: 'number', className: 'w-full bg-white/20 rounded-lg p-2 text-white font-black text-center outline-none focus:bg-white/30', value: value || '', onChange: e => onChange(e.target.value) }));
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
